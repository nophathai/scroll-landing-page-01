<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#fcfcfc">
    <title>Human OMO</title>
    <link rel="preload" as="image" href="new003-webp-desktop/frame-001.webp" media="(min-width: 761px)">
    <link rel="preload" as="image" href="new003-webp-desktop/frame-002.webp" media="(min-width: 761px)">
    <link rel="preload" as="image" href="new003-webp-desktop/frame-003.webp" media="(min-width: 761px)">
    <link rel="preload" as="image" href="new003-webp-desktop/frame-004.webp" media="(min-width: 761px)">
    <link rel="preload" as="image" href="new003-webp-mobile/frame-001.webp" media="(max-width: 760px)">
    <link rel="preload" as="image" href="new003-webp-mobile/frame-002.webp" media="(max-width: 760px)">
    <link rel="preload" as="image" href="new003-webp-mobile/frame-003.webp" media="(max-width: 760px)">
    <link rel="preload" as="image" href="new003-webp-mobile/frame-004.webp" media="(max-width: 760px)">
    <link rel="stylesheet" href="styles.css?v=final-smooth">
  </head>
  <body>
    <main class="page-shell">
      <section class="sequence-stage" id="top" aria-label="Human OMO scroll animation">
        <div class="sequence-stage__pin">
          <canvas class="sequence-canvas" width="1920" height="1080" aria-hidden="true"></canvas>
          <div class="sequence-shade" aria-hidden="true"></div>
          <div class="hero-title">
            <p class="hero-eyebrow">Scroll Experience</p>
            <h1>Human OMO</h1>
          </div>
          <div class="hero-description">
            <p>Playful motion, sharp frames, and a lightweight WebP sequence tuned for smooth scrolling on every screen.</p>
          </div>
          <div class="progress-rail sequence-progress" aria-hidden="true">
            <span></span>
          </div>
        </div>
      </section>

      <section class="gallery-band" id="gallery" aria-label="Selected frames">
        <div class="gallery-band__header">
          <p class="kicker">Selected Frames</p>
          <h2>Still moments after the motion</h2>
        </div>
        <div class="gallery-grid">
          <figure>
            <img src="webp/04.webp" alt="Human OMO visual frame 04" loading="lazy">
          </figure>
          <figure>
            <img src="webp/09.webp" alt="Human OMO visual frame 09" loading="lazy">
          </figure>
          <figure>
            <img src="webp/14.webp" alt="Human OMO visual frame 14" loading="lazy">
          </figure>
        </div>
      </section>

      <section class="outro" aria-label="Closing">
        <div class="outro__image" aria-hidden="true">
          <img src="webp/17.webp" alt="">
        </div>
        <div class="outro__content">
          <p class="kicker">Human OMO</p>
          <h2>Built to feel light, precise, and smooth.</h2>
          <a class="cta" href="#top">Back to top</a>
        </div>
      </section>
    </main>

    <script src="script.js?v=final-smooth"></script>
  </body>
</html>
